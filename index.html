        function moveRowUp(btn, branch, jobId) {
            const tr = btn.closest('tr');
            const prev = tr.previousElementSibling;
            if (prev) {
                tr.parentElement.insertBefore(tr, prev);
                if (FIREBASE_ENABLED && _lastSeenUploadId) {
                    const trOrder = parseInt(tr.dataset.order, 10);
                    const prevOrder = parseInt(prev.dataset.order, 10);
                    const prevJobId = prev.dataset.jobid;
                    const branchKey = branch.replace(/[.#$\[\]/]/g, '_');
                    const updates = {};
                    updates[`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${jobId}/order`] = prevOrder;
                    updates[`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${prevJobId}/order`] = trOrder;
                    db.ref().update(updates);
                    tr.dataset.order = prevOrder;
                    prev.dataset.order = trOrder;
                }
            }
        }

        function moveRowDown(btn, branch, jobId) {
            const tr = btn.closest('tr');
            const next = tr.nextElementSibling;
            if (next) {
                tr.parentElement.insertBefore(next, tr);
                if (FIREBASE_ENABLED && _lastSeenUploadId) {
                    const trOrder = parseInt(tr.dataset.order, 10);
                    const nextOrder = parseInt(next.dataset.order, 10);
                    const nextJobId = next.dataset.jobid;
                    const branchKey = branch.replace(/[.#$\[\]/]/g, '_');
                    const updates = {};
                    updates[`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${jobId}/order`] = nextOrder;
                    updates[`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${nextJobId}/order`] = trOrder;
                    db.ref().update(updates);
                    tr.dataset.order = nextOrder;
                    next.dataset.order = trOrder;
                }
            }
        }

        function deleteRow(btn, branch, jobId) {
            const tr = btn.closest('tr');
            if (confirm(`Smazat pozici "${tr.querySelector('td:nth-child(2) div')?.textContent?.trim() || '?'}"?`)) {
                tr.remove();
                if (FIREBASE_ENABLED && _lastSeenUploadId) {
                    const branchKey = branch.replace(/[.#$\[\]/]/g, '_');
                    db.ref(`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${jobId}`).remove();
                }
            }
        }

        function handleCandidateDelete(btn, branch, jobId, candidateId) {
            if (confirm("Opravdu smazat tohoto kandidáta?")) {
                btn.closest('.candidate-chip').remove();
                if (FIREBASE_ENABLED && _lastSeenUploadId) {
                    const branchKey = branch.replace(/[.#$\[\]/]/g, '_');
                    db.ref(`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${jobId}/candidates/${candidateId}`).remove();
                }
            }
        }

        function handleCandidateRename(el, branch, jobId, candidateId) {
            const name = el.textContent.trim();
            if (FIREBASE_ENABLED && _lastSeenUploadId) {
                const branchKey = branch.replace(/[.#$\[\]/]/g, '_');
                db.ref(`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${jobId}/candidates/${candidateId}`).update({ name });
            }
        }

        function handleRecruiterBlur(el, branch, jobId) {
            const name = el.textContent.trim();
            if (FIREBASE_ENABLED && _lastSeenUploadId) {
                const branchKey = branch.replace(/[.#$\[\]/]/g, '_');
                db.ref(`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${jobId}`).update({ recruiter: name });
            }
        }

        function toggleExpand(uid) {
            const collapseEl = document.getElementById('collapse-' + uid);
            const btnEl = document.getElementById('btn-' + uid);
            if (!collapseEl) return;
            const isHidden = collapseEl.classList.contains('hidden');
            collapseEl.classList.toggle('hidden', !isHidden);
            if (btnEl) btnEl.style.display = isHidden ? 'none' : '';
        }

        function handleAddCandidate(btn, branch, jobId, phaseKey, chipStyle) {
            const name = prompt('Jméno kandidáta:');
            if (!name || !name.trim()) return;
            const newId = crypto.randomUUID();
            const container = btn.parentElement;
            const chip = document.createElement('span');
            chip.className = `candidate-chip inline-flex items-center gap-1 px-2 py-0.5 rounded ${chipStyle} text-xs font-medium`;
            chip.dataset.id = newId;
            chip.innerHTML = `<span contenteditable="true" class="outline-none" onblur="handleCandidateRename(this, '${branch.replace(/'/g, "\\'")}', '${jobId}', '${newId}')">${name.trim()}</span><span class="chip-remove" onclick="handleCandidateDelete(this, '${branch.replace(/'/g, "\\'")}', '${jobId}', '${newId}')" title="Odebrat">&times;</span>`;
            container.insertBefore(chip, btn);

            if (FIREBASE_ENABLED && _lastSeenUploadId) {
                const branchKey = branch.replace(/[.#$\[\]/]/g, '_');
                db.ref(`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${jobId}/candidates/${newId}`).set({
                    name: name.trim(),
                    category: phaseKey,
                    date: ''
                });
            }
        }

        const ALL_PHASES = [
            { key: 'HIRED', label: 'Hired', labelStyle: 'text-red-600 font-semibold', chipStyle: 'bg-red-50 text-red-700 border border-red-200' },
            { key: 'HIRED_PAST', label: 'Hired in past', labelStyle: 'text-red-400 font-semibold', chipStyle: 'bg-red-50 text-red-400 border border-red-100' },
            { key: 'FOR_INTERVIEW', label: 'For interview', labelStyle: 'text-green-700 font-semibold', chipStyle: 'bg-green-50 text-green-700 border border-green-200' },
            { key: 'AFTER_INTERVIEW', label: 'After interview', labelStyle: 'text-emerald-700 font-semibold', chipStyle: 'bg-emerald-50 text-emerald-700 border border-emerald-200' },
            { key: 'OFFER_REFUSED', label: 'Offer refused', labelStyle: 'text-slate-500 font-medium', chipStyle: 'bg-slate-100 text-slate-500 border border-slate-200' },
            { key: 'NO_SHOW', label: 'No show', labelStyle: 'text-slate-500 font-medium', chipStyle: 'bg-slate-100 text-slate-500 border border-slate-200' },
            { key: 'NO_AFTER', label: 'No after interview', labelStyle: 'text-slate-500 font-medium', chipStyle: 'bg-slate-100 text-slate-500 border border-slate-200 line-through' },
        ];

        function showPhaseDropdown(event, trigger, branch, jobId) {
            event.stopPropagation();
            document.querySelectorAll('.phase-dropdown').forEach(el => el.remove());

            const dropdown = document.createElement('div');
            dropdown.className = 'phase-dropdown';
            ALL_PHASES.forEach(phase => {
                const btn = document.createElement('button');
                btn.className = phase.labelStyle;
                btn.textContent = phase.label;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    addPhaseRow(trigger, phase, branch, jobId);
                    dropdown.remove();
                };
                dropdown.appendChild(btn);
            });

            const rect = trigger.getBoundingClientRect();
            dropdown.style.position = 'fixed';
            dropdown.style.left = rect.left + 'px';
            dropdown.style.top = (rect.bottom + 4) + 'px';
            document.body.appendChild(dropdown);

            setTimeout(() => {
                document.addEventListener('click', function closeDropdown() {
                    dropdown.remove();
                    document.removeEventListener('click', closeDropdown);
                }, { once: true });
            }, 0);
        }

        function addPhaseRow(trigger, phase, branch, jobId) {
            const statusContainer = trigger.closest('.flex\\flex-col') || trigger.parentElement.parentElement;
            const row = document.createElement('div');
            row.className = 'phase-row flex items-start gap-2 py-0.5';
            row.innerHTML = `
                <span class="text-xs w-32 shrink-0 mt-0.5 ${phase.labelStyle}">${phase.label}</span>
                <div class="flex flex-wrap gap-1 items-center">
                    <span class="add-name-btn text-xs text-slate-400 hover:text-sky-500 px-1 rounded hover:bg-sky-50" onclick="handleAddCandidate(this, '${branch.replace(/'/g, "\\'")}', '${jobId}', '${phase.key}', '${phase.chipStyle}')" title="Přidat jméno">+</span>
                </div>
            `;
            statusContainer.insertBefore(row, trigger.closest('.relative'));
            handleAddCandidate(row.querySelector('.add-name-btn'), branch, jobId, phase.key, phase.chipStyle);
        }

        // Save CAP/ACT/VAC override when user finishes editing
        function handleOverrideBlur(el) {
            const refNumber = el.dataset.ref;
            const field = el.dataset.field;
            const branch = el.dataset.branch;
            const jobId = el.dataset.jobid;
            const rawValue = el.textContent.trim();
            const value = parseInt(rawValue, 10);
            if (!refNumber || !field) return;
            if (!isNaN(value)) {
                saveJobOverride(refNumber, field, value);
                // Push change to current active firebase report
                if (FIREBASE_ENABLED && _lastSeenUploadId && branch && jobId) {
                    const branchKey = branch.replace(/[.#$\[\]/]/g, '_');
                    db.ref(`reports/${_lastSeenUploadId}/branches/${branchKey}/jobs/${jobId}`).update({ [field]: value });
                }

                // Update VAC circle color live
                if (field === 'vac') {
                    el.style.background = value > 0 ? '#fee2e2' : '#dcfce7';
                    el.style.color = value > 0 ? '#b91c1c' : '#15803d';
                }
            }
        }

        /**
         * Step 5 — Real-time listener on /latestReport.
         * When any user pushes a new report to Firebase, all connected browsers
         * automatically receive the update and re-render the dashboard.
         * Falls back to IndexedDB (offline mode) if Firebase is not configured.
         */
        let _lastSeenUploadId = null;

        function startFirebaseListener() {
            if (!FIREBASE_ENABLED) {
                // Offline mode: use IndexedDB as before
                loadFileFromDB();
                return;
            }

            db.ref('latestReport').on('value', async (snapshot) => {
                const meta = snapshot.val();
                if (!meta || !meta.uploadId) return;

                // Avoid re-rendering when WE pushed the report (same session)
                if (meta.uploadId === _lastSeenUploadId) return;
                _lastSeenUploadId = meta.uploadId;

                try {
                    const reportSnap = await db.ref(`reports/${meta.uploadId}`).get();
                    const rawData = reportSnap.val();
                    if (!rawData || !rawData.branches) return;

                    // Convert Firebase structure back to grouped {branch: [jobs]}
                    const groupedData = {};
                    for (const [branchKey, branchData] of Object.entries(rawData.branches)) {
                        const branchName = branchData.name || branchKey;
                        groupedData[branchName] = [];
                        for (const [jobId, jobData] of Object.entries(branchData.jobs || {})) {
                            const candidates = Object.entries(jobData.candidates || {}).map(([id, c]) => ({
                                id, ...c
                            }));
                            groupedData[branchName].push({ jobId, ...jobData, candidates });
                        }
                    }

                    const jobOverrides = await loadAllJobOverrides();

                    dropZone.style.display = 'none';
                    dashboard.classList.remove('hidden');
                    document.getElementById('exportBtn').classList.remove('hidden');

                    renderDashboard(groupedData, jobOverrides);
                    _lastReportData = groupedData;
                    document.getElementById('statsBtn').classList.remove('hidden');
                    console.info(`[Firebase] Dashboard updated from report: ${meta.uploadId}`);
                } catch (err) {
                    console.error('[Firebase] Failed to load report from Firebase:', err);
                    // Fallback to IndexedDB
                    loadFileFromDB();
                }
            });
        }

        // ── Statistics Rendering ─────────────────────────────────────
        const _chartInstances = [];

        function destroyCharts() {
            _chartInstances.forEach(c => { try { c.destroy(); } catch (e) { } });
            _chartInstances.length = 0;
        }

        function createChart(canvas, config) {
            const inst = new Chart(canvas, config);
            _chartInstances.push(inst);
            return inst;
        }

        function renderStats(groupedData) {
            destroyCharts();
            statsContent.innerHTML = '';

            // ── Flatten all jobs & candidates ──
            const allJobs = [];
            const branchStats = {};
            const divisionStats = {};
            const recruiterStats = {};
            let totalVac = 0, totalPositions = 0;
            let totalHired = 0, totalForInterview = 0, totalAfterInterview = 0;
            let totalOfferRefused = 0, totalNoShow = 0, totalNoAfter = 0;
            let totalCandidates = 0;
            let ageSum = 0;
            const ageBuckets = { '0–14': 0, '15–30': 0, '31–60': 0, '61–90': 0, '90+': 0 };

            for (const [branch, jobs] of Object.entries(groupedData)) {
                if (!branchStats[branch]) branchStats[branch] = { positions: 0, vac: 0, candidates: 0, hired: 0 };
                for (const job of jobs) {
                    allJobs.push(job);
                    totalPositions++;
                    totalVac += job.vac;
                    ageSum += job.daysOpen;
                    branchStats[branch].positions++;
                    branchStats[branch].vac += job.vac;

                    // Age buckets
                    if (job.daysOpen <= 14) ageBuckets['0–14']++;
                    else if (job.daysOpen <= 30) ageBuckets['15–30']++;
                    else if (job.daysOpen <= 60) ageBuckets['31–60']++;
                    else if (job.daysOpen <= 90) ageBuckets['61–90']++;
                    else ageBuckets['90+']++;

                    // Division
                    const div = job.division || 'Ostatní';
                    if (!divisionStats[div]) divisionStats[div] = { positions: 0, vac: 0, hired: 0 };
                    divisionStats[div].positions++;
                    divisionStats[div].vac += job.vac;

                    // Recruiter
                    const rec = job.recruiter || '-';
                    if (!recruiterStats[rec]) recruiterStats[rec] = { positions: 0, vac: 0, hired: 0, candidates: 0 };
                    recruiterStats[rec].positions++;
                    recruiterStats[rec].vac += job.vac;

                    for (const c of job.candidates) {
                        totalCandidates++;
                        branchStats[branch].candidates++;
                        recruiterStats[rec].candidates++;
                        if (c.category === 'HIRED' || c.category === 'HIRED_PAST') {
                            totalHired++;
                            branchStats[branch].hired++;
                            divisionStats[div].hired++;
                            recruiterStats[rec].hired++;
                        }
                        else if (c.category === 'FOR_INTERVIEW') totalForInterview++;
                        else if (c.category === 'AFTER_INTERVIEW') totalAfterInterview++;
                        else if (c.category === 'OFFER_REFUSED') totalOfferRefused++;
                        else if (c.category === 'NO_SHOW') totalNoShow++;
                        else if (c.category === 'NO_AFTER') totalNoAfter++;
                    }
                }
            }

            const avgAge = totalPositions > 0 ? Math.round(ageSum / totalPositions) : 0;
            const hiringRate = totalCandidates > 0 ? Math.round((totalHired / totalCandidates) * 100) : 0;
            const positionsOver60 = allJobs.filter(j => j.daysOpen > 60).length;
            const positionsOver90 = allJobs.filter(j => j.daysOpen > 90).length;

            // ── Card helper ──
            const card = (title, content, span = '') => `
                <div class="branch-card" style="padding:20px;${span}">
                    <div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:14px;letter-spacing:-0.01em;">${title}</div>
                    ${content}
                </div>`;

            const kpiMini = (label, value, color = 'var(--text-primary)') => `
                <div style="text-align:center;padding:8px;">
                    <div style="font-size:28px;font-weight:800;color:${color};letter-spacing:-0.03em;">${value}</div>
                    <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;">${label}</div>
                </div>`;

            // ── Build HTML ──
            let html = '';

            // Row 1: Key KPIs
            html += `<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:16px;">`;
            html += card('', kpiMini('Otevřených pozic', totalPositions));
            html += card('', kpiMini('Volná místa (VAC)', totalVac, 'var(--brand-500)'));
            html += card('', kpiMini('Přijato / Hired', totalHired, '#10b981'));
            html += card('', kpiMini('K pohovoru', totalForInterview + totalAfterInterview, '#f59e0b'));
            html += card('', kpiMini('Ø stáří pozice', avgAge + ' dní', avgAge > 45 ? '#ef4444' : 'var(--text-secondary)'));
            html += card('', kpiMini('Hiring rate', hiringRate + '%', hiringRate > 20 ? '#10b981' : '#f59e0b'));
            html += `</div>`;

            // Row 2: Warning KPIs
            html += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;">`;
            html += card('', kpiMini('Pozic > 60 dní', positionsOver60, positionsOver60 > 0 ? '#ef4444' : '#10b981'));
            html += card('', kpiMini('Pozic > 90 dní', positionsOver90, positionsOver90 > 0 ? '#ef4444' : '#10b981'));
            html += card('', kpiMini('Odmítnuté nabídky', totalOfferRefused, totalOfferRefused > 3 ? '#ef4444' : 'var(--text-secondary)'));
            html += card('', kpiMini('No-show', totalNoShow, totalNoShow > 2 ? '#ef4444' : 'var(--text-secondary)'));
            html += `</div>`;

            // Row 3: Charts - VAC by Branch + VAC by Division
            html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">`;
            html += card('VAC dle pobočky', '<canvas id="chartVacBranch" height="260"></canvas>');
            html += card('VAC dle divize', '<canvas id="chartVacDivision" height="260"></canvas>');
            html += `</div>`;

            // Row 4: Pipeline funnel + Age distribution
            html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">`;
            html += card('Pipeline kandidátů', '<canvas id="chartPipeline" height="240"></canvas>');
            html += card('Stáří pozic (distribuce)', '<canvas id="chartAge" height="240"></canvas>');
            html += `</div>`;

            // Row 5: Recruiter workload table
            const recEntries = Object.entries(recruiterStats).sort((a, b) => b[1].positions - a[1].positions);
            let recTable = `<table style="width:100%;font-size:12px;border-collapse:collapse;">
                <thead><tr style="border-bottom:2px solid var(--brand-100);">
                    <th style="text-align:left;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Konzultant</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Pozice</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">VAC</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Kandidáti</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Hired</th>
                </tr></thead><tbody>`;
            for (const [name, s] of recEntries) {
                recTable += `<tr style="border-bottom:1px solid #e8edf2;">
                    <td style="padding:8px 8px;font-weight:600;color:var(--text-primary);">${name}</td>
                    <td style="text-align:center;padding:8px;">${s.positions}</td>
                    <td style="text-align:center;padding:8px;font-weight:700;color:var(--brand-500);">${s.vac}</td>
                    <td style="text-align:center;padding:8px;">${s.candidates}</td>
                    <td style="text-align:center;padding:8px;font-weight:600;color:#10b981;">${s.hired}</td>
                </tr>`;
            }
            recTable += `</tbody></table>`;

            // Row 5b: Positions by branch table
            const branchEntries = Object.entries(branchStats).sort((a, b) => b[1].vac - a[1].vac);
            let branchTable = `<table style="width:100%;font-size:12px;border-collapse:collapse;">
                <thead><tr style="border-bottom:2px solid var(--brand-100);">
                    <th style="text-align:left;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Pobočka</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Pozice</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">VAC</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Kandidáti</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Hired</th>
                </tr></thead><tbody>`;
            for (const [name, s] of branchEntries) {
                branchTable += `<tr style="border-bottom:1px solid #e8edf2;">
                    <td style="padding:8px;font-weight:600;color:var(--text-primary);">${name}</td>
                    <td style="text-align:center;padding:8px;">${s.positions}</td>
                    <td style="text-align:center;padding:8px;font-weight:700;color:var(--brand-500);">${s.vac}</td>
                    <td style="text-align:center;padding:8px;">${s.candidates}</td>
                    <td style="text-align:center;padding:8px;font-weight:600;color:#10b981;">${s.hired}</td>
                </tr>`;
            }
            branchTable += `</tbody></table>`;

            html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">`;
            html += card('Workload HR konzultantů', recTable);
            html += card('Přehled dle poboček', branchTable);
            html += `</div>`;

            // Row 6: Top 10 longest open positions
            const topOld = [...allJobs].sort((a, b) => b.daysOpen - a.daysOpen).slice(0, 10);
            let oldTable = `<table style="width:100%;font-size:12px;border-collapse:collapse;">
                <thead><tr style="border-bottom:2px solid var(--brand-100);">
                    <th style="text-align:left;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Pozice</th>
                    <th style="text-align:left;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Divize</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Dní</th>
                    <th style="text-align:center;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">VAC</th>
                    <th style="text-align:left;padding:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Konzultant</th>
                </tr></thead><tbody>`;
            for (const j of topOld) {
                oldTable += `<tr style="border-bottom:1px solid #e8edf2;">
                    <td style="padding:8px;font-weight:600;color:var(--text-primary);">${j.position}</td>
                    <td style="padding:8px;color:var(--text-secondary);">${j.division || '-'}</td>
                    <td style="text-align:center;padding:8px;font-weight:700;color:${j.daysOpen > 60 ? '#ef4444' : 'var(--text-secondary)'};">${j.daysOpen}</td>
                    <td style="text-align:center;padding:8px;font-weight:700;color:var(--brand-500);">${j.vac}</td>
                    <td style="padding:8px;color:var(--text-secondary);">${j.recruiter || '-'}</td>
                </tr>`;
            }
            oldTable += `</tbody></table>`;
            html += card('🚨 TOP 10 nejdéle otevřených pozic', oldTable);

            statsContent.innerHTML = html;

            // ── Render Charts ──

            // 1. VAC by Branch (horizontal bar)
            const branchLabels = branchEntries.map(e => e[0]);
            const branchVacs = branchEntries.map(e => e[1].vac);
            createChart(document.getElementById('chartVacBranch'), {
                type: 'bar',
                data: {
                    labels: branchLabels,
                    datasets: [{
                        label: 'VAC',
                        data: branchVacs,
                        backgroundColor: 'rgba(14, 165, 233, 0.7)',
                        borderRadius: 6,
                        borderSkipped: false,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 11 } } },
                        y: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 11, weight: 600 } } }
                    }
                }
            });

            // 2. VAC by Division (horizontal bar)
            const divEntries = Object.entries(divisionStats).sort((a, b) => b[1].vac - a[1].vac);
            createChart(document.getElementById('chartVacDivision'), {
                type: 'bar',
                data: {
                    labels: divEntries.map(e => e[0]),
                    datasets: [{
                        label: 'VAC',
                        data: divEntries.map(e => e[1].vac),
                        backgroundColor: 'rgba(56, 189, 248, 0.7)',
                        borderRadius: 6,
                        borderSkipped: false,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 11 } } },
                        y: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 11, weight: 600 } } }
                    }
                }
            });

            // 3. Pipeline (doughnut)
            createChart(document.getElementById('chartPipeline'), {
                type: 'doughnut',
                data: {
                    labels: ['Hired', 'K pohovoru', 'Po pohovoru', 'Odmítnutá nabídka', 'No-show', 'Zamítnuto po poh.'],
                    datasets: [{
                        data: [totalHired, totalForInterview, totalAfterInterview, totalOfferRefused, totalNoShow, totalNoAfter],
                        backgroundColor: ['#ef4444', '#22c55e', '#059669', '#94a3b8', '#cbd5e1', '#e2e8f0'],
                        borderWidth: 2,
                        borderColor: '#fff',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { font: { family: 'Inter', size: 11 }, padding: 12 } },
                    }
                }
            });

            // 4. Age distribution (bar)
            createChart(document.getElementById('chartAge'), {
                type: 'bar',
                data: {
                    labels: Object.keys(ageBuckets).map(k => k + ' dní'),
                    datasets: [{
                        label: 'Počet pozic',
                        data: Object.values(ageBuckets),
                        backgroundColor: ['#10b981', '#22c55e', '#f59e0b', '#f97316', '#ef4444'],
                        borderRadius: 6,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 11, weight: 600 } } },
                        y: { beginAtZero: true, grid: { color: 'rgba(14,165,233,0.05)' }, ticks: { font: { family: 'Inter', size: 11 } } }
                    }
                }
            });
        }

        const auth = firebase.auth();
        const loginOverlay = document.getElementById('loginOverlay');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const loginError = document.getElementById('loginError');

        function handleLogin(isRegister) {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            loginError.style.display = 'none';

            if (!email || !password) {
                loginError.textContent = 'Zadejte e-mail a heslo.';
                loginError.style.color = '#ef4444';
                loginError.style.display = 'block';
                return;
            }

            if (!email.toLowerCase().endsWith('@aaaauto.cz') && !email.toLowerCase().endsWith('@auresholdings.eu')) {
                loginError.textContent = 'Přístup je povolen pouze pro e-maily @aaaauto.cz a @auresholdings.eu';
                loginError.style.color = '#ef4444';
                loginError.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                loginError.textContent = 'Heslo musí mít alespoň 6 znaků.';
                loginError.style.color = '#ef4444';
                loginError.style.display = 'block';
                return;
            }

            if (isRegister) {
                registerBtn.innerHTML = 'Registruji...';
                registerBtn.disabled = true;
                loginBtn.disabled = true;

                auth.createUserWithEmailAndPassword(email, password)
                    .then(() => {
                        // state observer handles success
                    })
                    .catch((error) => {
                        loginError.textContent = 'Chyba registrace: ' + error.message;
                        if (error.code === 'auth/email-already-in-use') {
                            loginError.textContent = 'Účet s tímto e-mailem již existuje. Použijte tlačítko Přihlásit se.';
                        }
                        loginError.style.color = '#ef4444';
                        loginError.style.display = 'block';
                        registerBtn.innerHTML = 'Nová registrace';
                        registerBtn.disabled = false;
                        loginBtn.disabled = false;
                    });
            } else {
                loginBtn.innerHTML = 'Ověřování...';
                loginBtn.disabled = true;
                registerBtn.disabled = true;

                auth.signInWithEmailAndPassword(email, password)
                    .then(() => {
                        // state observer handles success
                    })
                    .catch((error) => {
                        loginError.textContent = 'Chyba přihlášení. Zkontrolujte e-mail a heslo.';
                        loginError.style.color = '#ef4444';
                        loginError.style.display = 'block';
                        loginBtn.innerHTML = 'Přihlásit se';
                        loginBtn.disabled = false;
                        registerBtn.disabled = false;
                    });
            }
        }

        window.addEventListener('load', () => {
            if (!FIREBASE_ENABLED) {
                // Offline mode, no login needed
                startFirebaseListener();
            } else {
                // Global auth state
                auth.onAuthStateChanged(user => {
                    if (user) {
                        // Double check domain even after successful auth just in case
                        if (!user.email.endsWith('@aaaauto.cz') && !user.email.endsWith('@auresholdings.eu')) {
                            auth.signOut();
                            return;
                        }
                        // Logged in
                        loginOverlay.style.opacity = '0';
                        setTimeout(() => loginOverlay.style.display = 'none', 300);
                        startFirebaseListener();
                    } else {
                        // Not logged in
                        loginOverlay.style.display = 'flex';
                        loginOverlay.style.opacity = '1';
                        // Reset buttons
                        if (loginBtn) {
                            loginBtn.innerHTML = 'Přihlásit se';
                            loginBtn.disabled = false;
                        }
                        if (registerBtn) {
                            registerBtn.innerHTML = 'Nová registrace';
                            registerBtn.disabled = false;
                        }
                    }
                });
            }
        });

    </script>
</body>

</html>
